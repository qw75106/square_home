name: square_home
description: Square Home – Windows Phone-style launcher for Android
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  installed_apps: ^1.4.3
  image_picker: ^1.1.2
  intl: ^0.19.0
  path_provider: ^2.1.3
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
